<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erika Saavedra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <ul class="menu">
      <li><a href="#home" data-en="HOME" data-fr="ACCUEIL" data-es="INICIO">HOME</a></li>
      <li><a href="#about" data-en="ABOUT ME" data-fr="À PROPOS" data-es="SOBRE MÍ">ABOUT ME</a></li>
      <li><a href="#resume" data-en="RESUME" data-fr="CV" data-es="CURRÍCULUM">RESUME</a></li>
    </ul>

    <div class="lang">
      <button onclick="cambiarIdioma('en')">EN</button>
      <button onclick="cambiarIdioma('fr')">FR</button>
      <button onclick="cambiarIdioma('es')">ES</button>
    </div>
  </nav>

  <!-- HOME -->
  <header id="home" class="hero">
    <h1 
      data-en="Creative Developer"
      data-fr="Développeuse Créative"
      data-es="Desarrolladora Creativa">
      Creative Developer
    </h1>

    <p 
      data-en="I design modern websites"
      data-fr="Je crée des sites modernes"
      data-es="Diseño sitios web modernos">
      I design modern websites
    </p>
  </header>

  <!-- ABOUT -->
  <section id="about" class="section">
    <h2 
      data-en="About Me"
      data-fr="À propos de moi"
      data-es="Sobre mí">
      About Me
    </h2>

    <p 
      data-en="Passionate about design and technology."
      data-fr="Passionnée par le design et la technologie."
      data-es="Apasionada por el diseño y la tecnología.">
      Passionate about design and technology.
    </p>
  </section>

  <!-- RESUME -->
  <section id="resume" class="section">
    <h2 
      data-en="Resume"
      data-fr="CV"
      data-es="Currículum">
      Resume
    </h2>

    <p 
      data-en="Here is my professional experience."
      data-fr="Voici mon expérience professionnelle."
      data-es="Aquí está mi experiencia profesional.">
      Here is my professional experience.
    </p>
  </section>

  <script src="script.js"></script>
</body>
</html>
